name: Deploy and Verify Portfolio

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# Force all JavaScript-based actions to execute using the Node.js 24 runtime to resolve Node.js 20 deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-dist
          path: dist/
          retention-days: 7
